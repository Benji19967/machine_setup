- name: Check if pyenv is already installed
  stat:
    path: "/home/labrecqb/.pyenv"
  register: pyenv_dir
  tags:
    - install
    - python
- name: Install pyenv
  shell: "curl -fsSL https://pyenv.run | bash"
  when: not pyenv_dir.stat.exists
  tags:
    - install
    - python
# TODO: needs to be fixed on the Raspberry Pi
- name: Install Python build dependencies for Ubuntu 24.04
  become: true
  apt:
    name:
      - build-essential
      - libssl-dev
      #- zlib1g-dev
      - zlib1g=1:1.3.dfsg-3.1ubuntu2
      # - libbz2-dev
      - libbz2-1.0=1.0.8-5.1
      - libreadline-dev
      - libsqlite3-dev
      - libncursesw5-dev
      - xz-utils
      - tk-dev
      - libxml2-dev
      - libxmlsec1-dev
      - libffi-dev
      - liblzma-dev
      - curl
      - git
  tags:
    - install
    - python
- name: Install a specific Python version
  shell: |
    pyenv install 3.12
  tags:
    - install
    - python
- name: Set global python version
  shell: |
    pyenv global 3.12
  tags:
    - install
    - python
- name: Install pip and venv
  become: true
  apt:
    name: [
      "python3-pip", # used to install pipx
      "python3-venv", # used by pipx
          ]
  tags:
    - install
    - python
- name: Pip install pipx
  shell: "pip install pipx"
  tags:
  - install
  - python
- name: Pipx install poetry
  shell: "pipx install poetry"
  tags:
  - install
  - python
- name: Cloning build_tools
  ansible.builtin.git:
    repo: 'git@github.com:Benji19967/build_tools.git'
    dest: "{{ lookup('env', 'WORKSPACE') }}/build_tools"
    update: no
    accept_hostkey: yes
    version: master
  tags:
    - install
    - python
- name: Install uv
  shell: "curl -LsSf https://astral.sh/uv/install.sh | sh"
  tags:
  - install
  - python
