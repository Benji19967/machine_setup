- name: Install pixi
  shell: curl -fsSL https://pixi.sh/install.sh | sh
  tags:
  - install
  - robotics
- name: Check if robostack already initialized
  stat:
    path: "{{ lookup('env', 'WORKSPACE') }}/robostack/pixi.toml"
  register: robotstack_toml
  tags:
    - install
    - robotics
- name: Install RoboStack # https://robostack.github.io/GettingStarted.html
  shell: cd $WORKSPACE && pixi init robostack
  when: not robotstack_toml.stat.exists
  tags:
  - install
  - robotics
