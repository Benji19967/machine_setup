- name: Install apps with homebrew
  homebrew: name={{ item }} state=present
  with_items:
    - wget
    - tmux
    - htop
    - rg
    - git-delta
    - hyperfine
    - eza
    - dust
    # To unzip / unrar
    # - sevenzip
    # To unzip / unrar
    - unar
    - fd
    # Font for alacritty to show icons
    # https://www.josean.com/posts/how-to-setup-alacritty-terminal
    - font-meslo-lg-nerd-font
    # For decker (slides)
    - rsync 
    - graphviz 
    - gnuplot 
    - pdf2svg 
    - yarn 
    - coreutils 
    - pkg-config 
    - nnn
    - node
    # image rendering in neovim telescope
    - chafa
    # image rendering in neovim using snacks.nvim
    - imagemagick 
    # required by imagemagick
    - ghostscript
    # Format lua code
    - stylua
    # Search and replace for code
    - ast-grep
    # Java build tool
    - maven
    # For network discovery
    - nmap


- name: Install apps with homebrew (cask)
  homebrew_cask: name={{ item }} state=present
  with_items:
    - julia 
    - ghostty
    - nikitabobko/tap/aerospace
