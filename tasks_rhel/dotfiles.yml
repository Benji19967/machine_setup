- name: Ensure EPEL repository is present
  become: true
  ansible.builtin.dnf:
    name: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  tags:
    - install
    - dotfiles
    - stow

- name: Installing stow
  become: true
  ansible.builtin.dnf:
    name: stow
    state: present
  tags:
    - install
    - dotfiles
    - stow

- name: Cloning dotfiles
  ansible.builtin.git:
    repo: 'git@github.com:Benji19967/dotfiles.git'
    dest: "{{ lookup('env', 'WORKSPACE') }}/dotfiles"
    recursive: yes
    update: yes
    accept_hostkey: yes
    version: master
  tags:
    - install
    - dotfiles
    - stow

- name: Stow dotfiles
  ansible.builtin.shell: |
    cd "{{ lookup('env', 'WORKSPACE') }}/dotfiles" && ./install-ubuntu
  tags:
    - install
    - dotfiles
    - stow
